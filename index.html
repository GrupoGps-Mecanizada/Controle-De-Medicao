<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Controle de Medição</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

  <!-- CSS Modules -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/topbar.css" />
  <link rel="stylesheet" href="css/drawer.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/toast.css" />
  <link rel="stylesheet" href="css/filterbar.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/table.css" />
  <link rel="stylesheet" href="css/hub.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
  <link rel="stylesheet" href="css/excel-table.css" />
</head>

<body>
  <!-- ==================== LOGIN SCREEN ==================== -->
  <div id="login-screen" class="hidden">
    <canvas id="bg-canvas"
      style="position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.5;"></canvas>
    <div id="vignette"
      style="position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 40%, transparent 45%, rgba(180,192,210,0.18) 100%); pointer-events: none; z-index: 1;">
    </div>

    <div class="login-box" style="z-index: 10; position: relative;">
      <div
        style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 30px; text-align: center;">
        <span
          style="font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: #94a3b8;">Grupo
          GPS</span>
        <span
          style="font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.02em; color: #0a2fa8; line-height: 1.2;">ADMINISTRAÇÃO</span>
        <div
          style="width: 32px; height: 2px; background: #0a2fa8; border-radius: 2px; opacity: 0.25; margin-top: 6px; margin-bottom: 12px;">
        </div>
        <span
          style="font-size: 13px; font-weight: 600; color: #475569; letter-spacing: 0.05em; text-transform: uppercase;">Controle
          de Medição</span>
      </div>
      <form id="login-form">
        <div class="login-input-group" id="group-name" style="display: none;">
          <label>Nome</label>
          <input type="text" id="login-name" autocomplete="name" />
        </div>
        <div class="login-input-group">
          <label>E-mail</label>
          <input type="email" id="login-user" required autocomplete="username" />
        </div>
        <div class="login-input-group">
          <label>Senha</label>
          <input type="password" id="login-pass" required autocomplete="current-password" />
        </div>
        <button type="submit" class="login-btn" id="login-submit">Entrar</button>
        <div style="text-align: center; margin-top: 15px; font-size: 13px;">
          <a href="#" id="toggle-register" style="color: #0f3868; text-decoration: none; font-weight: 600;">Criar uma
            conta</a>
        </div>
      </form>
      <div class="login-error" id="login-error"></div>
    </div>
    <div class="login-footer">
      Desenvolvido por Warlison Abreu | Icaro Bernardo - Grupo GPS
    </div>
  </div>

  <div id="app">
    <!-- ==================== LOADING SCREEN ==================== -->
    <div id="loading-screen" style="background:#f4f7fa; z-index: 9999;">
      <div class="loading-content" style="max-width:280px;">
        <div class="loading-bar-container"
          style="background:rgba(15,56,104,0.08); border-radius:6px; overflow:hidden; height:3px;">
          <div class="loading-bar"
            style="background:linear-gradient(90deg,#0f3868,#2563eb); border-radius:6px; height:100%;"></div>
        </div>
        <div id="loading-status"
          style="color:#94a3b8; font-size:12px; font-weight:500; margin-top:14px; text-align:center; letter-spacing:0.02em;">
          Conectando...</div>
      </div>
    </div>

    <!-- ==================== TOPBAR ==================== -->
    <div id="topbar">
      <div id="topbar-left">
        <button id="nav-menu-btn" class="topbar-icon-btn" aria-label="Menu de Navegação" title="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>

      <div id="nav-menu-overlay" class="nav-menu-overlay hidden">
        <div class="nav-menu-panel">
          <div class="nav-menu-header" style="justify-content:flex-start; padding:20px 16px; align-items:center; min-height:80px;">
            <div id="logo-home" style="display:flex; justify-content:flex-start; align-items:center; cursor:pointer; width:100%;" title="Voltar ao Dashboard">
              <svg width="100%" height="56" viewBox="30 45 550 130" xmlns="http://www.w3.org/2000/svg">
                <defs><style>text { font-family: 'Inter', 'Open Sans', sans-serif; }</style></defs>
                <g text-anchor="start">
                  <text x="50" y="110" font-size="42" font-weight="700" fill="#002D5C">Grupo GPS</text>
                  <line x1="300" y1="55" x2="300" y2="155" stroke="#757575" stroke-width="1.5"/>
                  <g transform="translate(315, 0)">
                    <text x="0" y="96" font-size="28" font-weight="600" fill="#0a2fa8">ADMINISTRAÇÃO</text>
                    <text x="0" y="132" font-size="20" font-weight="400" fill="#757575">CONTROLE DE MEDIÇÃO</text>
                    <text x="228" y="155" font-size="12" font-weight="400" fill="#aaa" text-anchor="end">By SGE</text>
                  </g>
                </g>
              </svg>
            </div>
          </div>
          <div class="nav-menu-body">
            <div class="nav-menu-section">
              <div class="nav-menu-section-title">Medição</div>
              <button class="nav-menu-item active" data-view="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                  <rect x="3" y="3" width="7" height="7" rx="1" />
                  <rect x="14" y="3" width="7" height="7" rx="1" />
                  <rect x="3" y="14" width="7" height="7" rx="1" />
                  <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                Visão Geral
              </button>
              <button class="nav-menu-item" data-view="table">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                Tabela <span class="sb-pill" id="sb-count"
                  style="margin-left:auto;font-size:10px;background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:10px;">—</span>
              </button>
              <button class="nav-menu-item" data-view="crs" id="btn-manage-crs">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                  </path>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Gerenciar CRs
              </button>
            </div>
          </div>
          <div class="nav-menu-footer">
            <div id="nav-menu-user" class="nav-menu-user-info"></div>
            <button id="logout-btn"
              style="margin-top:10px; width:100%; border:none; background:#f1f5f9; padding:8px; border-radius:6px; cursor:pointer; color:#475569; font-weight:600;">Sair</button>
          </div>
        </div>
      </div>

      <div id="topbar-right" style="display:flex; align-items:center; gap:8px;">
        <button id="dark-mode-btn" class="topbar-icon-btn" title="Alternar modo escuro" aria-label="Modo escuro">
          <svg id="dark-mode-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="width:18px;height:18px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
          <svg id="dark-mode-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="width:18px;height:18px;display:none;">
            <circle cx="12" cy="12" r="5" />
            <path stroke-linecap="round"
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
        </button>

        <button id="filter-toggle-btn" class="topbar-icon-btn filter-btn" title="Filtros" aria-label="Abrir Filtros"
          style="position:relative;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--text-3);cursor:pointer;padding:6px;border-radius:6px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" style="width:18px;height:18px;">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
          </svg>
          <span id="filter-count-badge" class="filter-count-badge hidden"
            style="position:absolute;top:0;right:0;background:var(--blue);color:white;font-size:9px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;">0</span>
        </button>

        <button class="btn btn-primary" id="btn-novo-bm"
          style="display:flex;align-items:center;gap:6px;border-radius:6px;background:var(--blue);color:#fff;border:none;padding:6px 12px;font-weight:600;font-size:12px;cursor:pointer;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          Novo BM
        </button>
      </div>
    </div>

    <!-- ==================== FILTER DROPDOWN PANEL ==================== -->
    <div id="filter-dropdown-panel" class="filter-dropdown-panel hidden" style="top:56px; right:16px;">
      <div class="filter-dropdown-header">
        <span>Filtros</span>
        <button id="filter-clear-all" class="filter-clear-btn">Limpar Tudo</button>
      </div>
      <div class="filter-dropdown-body" id="filter-dropdown-body">
        <!-- Built dynamically by Navigation.buildFilterDropdown() -->
      </div>
    </div>

    <!-- ==================== MAIN CONTENT ==================== -->
    <div id="main">

      <!-- FILTER BAR (For search and counts) -->
      <div class="fb" style="display:flex;align-items:center;gap:8px;margin: 18px 0;flex-wrap:wrap;">
        <input class="finp" id="searchInput" placeholder="Buscar descrição, pedido, folha…"
          style="display:none; padding:8px 12px; border:1px solid var(--border); border-radius:6px; color:var(--text-1); font-size:12px;" />
        <div class="fb-right" id="fb-right" style="margin-left:auto;font-size:12px;color:var(--text-2);"></div>
      </div>

      <div id="dashboard-view" class="view active"></div>
      <div id="table-view" class="view hidden"></div>
      <div id="crs-view" class="view hidden" style="padding-top: 10px;"></div>

    </div>

    <!-- ==================== MODAL ==================== -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal" class="modal-box">
        <div class="modal-header">
          <div class="modal-title" id="mtitle">Novo Boletim de Medição</div>
          <button class="close-modal"
            style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-3);line-height:1;">✕</button>
        </div>
        <div class="modal-body" id="modal-body-content">
          <input type="hidden" id="eid" />
          <div class="fgrid">
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">CR</label>
              <input class="finput" id="f-cr" placeholder="Ex: 18512" list="cr-autofill-list" />
              <datalist id="cr-autofill-list"></datalist>
            </div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Mês</label><input
                class="finput" type="month" id="f-mes" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);"> Início
                Período</label><input class="finput" type="date" id="f-periodo-inicio" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);"> Fim
                Período</label><input class="finput" type="date" id="f-periodo-fim" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Pedido</label><input
                class="finput" id="f-pedido" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Folha de
                Registro</label><input class="finput" id="f-folha" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;grid-column:1/-1;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Descrição da
                Folha</label><input class="finput" id="f-descricao" /></div>
            <div style="grid-column:1/-1;height:1px;background:var(--border);margin:4px 0;"></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Valor a Medir
                (R$)</label><input class="finput" type="text" id="f-medir" placeholder="0,00"
                oninput="maskCurrency(this)" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Data de
                Aprovação</label><input class="finput" type="date" id="f-aprovacao" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Data de Envio ao
                Cliente</label><input class="finput" type="date" id="f-envio" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Valor BM Enviado
                (R$)</label><input class="finput" type="text" id="f-valorBM" placeholder="0,00"
                oninput="maskCurrency(this)" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Valor Glosa
                (R$)</label><input class="finput" type="text" id="f-glosa" placeholder="0,00"
                oninput="maskCurrency(this)" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Responsável</label><input
                class="finput" id="f-responsavel" placeholder="Nome" /></div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;grid-column:1/-1;">
              <label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);display:flex;justify-content:space-between;">
                Motivo da Glosa
                <button id="btn-manage-motivos"
                  style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:10px;text-decoration:underline;">Gerenciar
                  Motivos</button>
              </label>
              <select class="finput" id="f-motivo">
                <!-- Loaded dynamically -->
              </select>
            </div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;grid-column:1/-1;"><label
                style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Etapa do
                Workflow</label><select class="finput" id="f-stage" style="height:34px"></select></div>
          </div>
        </div>
        <div class="modal-footer" style="display:flex;gap:8px;margin-top:20px;">
          <button class="btn btn-primary" id="save-bm-btn"
            style="flex:1;background:var(--blue);color:#fff;border:none;border-radius:6px;font-weight:600;padding:10px;">Salvar
            Boletim</button>
          <button class="btn close-modal"
            style="padding:10px 20px;background:#fff;border:1px solid var(--border);border-radius:6px;font-weight:600;color:var(--text-2);">Cancelar</button>
        </div>
      </div>
    </div>



    <!-- ==================== CR MODAL ==================== -->
    <div id="cr-modal-overlay" class="modal-overlay hidden" style="z-index:99999;">
      <div class="modal-box" style="width:480px;">
        <div class="modal-header">
          <div class="modal-title" id="cr-modal-title">Novo Centro de Resultado</div>
          <button id="cr-modal-close" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-3);line-height:1;">✕</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="cr-modal-editing-id" />
          <div class="fgrid">
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;">
              <label style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Nº do CR</label>
              <input class="finput" id="cr-modal-id" placeholder="Ex: 18512" />
            </div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;">
              <label style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Nome do Contrato</label>
              <input class="finput" id="cr-modal-contrato" placeholder="Nome do Contrato" />
            </div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;">
              <label style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Cliente</label>
              <input class="finput" id="cr-modal-cliente" placeholder="Nome do Cliente" />
            </div>
            <div class="ff" style="display:flex;flex-direction:column;gap:4px;">
              <label style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);">Responsável</label>
              <input class="finput" id="cr-modal-responsavel" placeholder="Nome do Responsável" />
            </div>
          </div>
        </div>
        <div class="modal-footer" style="display:flex;gap:8px;margin-top:20px;">
          <button id="cr-modal-save" style="flex:1;background:var(--blue);color:#fff;border:none;border-radius:6px;font-weight:600;padding:10px;cursor:pointer;">Salvar CR</button>
          <button id="cr-modal-cancel" style="padding:10px 20px;background:#fff;border:1px solid var(--border);border-radius:6px;font-weight:600;color:var(--text-2);cursor:pointer;">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- ==================== MOTIVOS MANAGER MODAL ==================== -->
    <div id="motivos-modal-overlay" class="modal-overlay hidden" style="z-index: 100000;">
      <div class="modal-box" style="width: 400px;">
        <div class="modal-header">
          <div class="modal-title">Motivos de Glosa</div>
          <button class="close-motivos-modal"
            style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-3);line-height:1;">✕</button>
        </div>
        <div class="modal-body">
          <div style="display:flex; gap:8px; margin-bottom:20px;">
            <input type="text" id="new-motivo-input" class="finp" style="flex:1"
              placeholder="Ex: Falta de Documentação" />
            <button id="add-motivo-btn"
              style="background:var(--blue);color:#fff;border:none;border-radius:6px;padding:0 16px;font-weight:600;cursor:pointer;font-size:13px;">Adicionar</button>
          </div>

          <div
            style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:8px;">
            Motivos Cadastrados</div>
          <div id="motivos-list"
            style="max-height: 250px; overflow-y: auto; display:flex; flex-direction:column; gap:6px;">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== HUB OVERLAY ==================== -->
    <div id="hub-dropdown-overlay" class="hub-dropdown-overlay hidden">
      <div class="hub-dropdown-panel">
        <div class="hub-panel-header">
          <div class="hub-panel-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
              style="width:18px;height:18px;">
              <rect x="3" y="3" width="7" height="7" rx="1.5" />
              <rect x="14" y="3" width="7" height="7" rx="1.5" />
              <rect x="3" y="14" width="7" height="7" rx="1.5" />
              <rect x="14" y="14" width="7" height="7" rx="1.5" />
            </svg>
            Ecossistema SGE
          </div>
          <button id="hub-close-btn" class="hub-close-btn" aria-label="Fechar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
              <path stroke-linecap="round" d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
